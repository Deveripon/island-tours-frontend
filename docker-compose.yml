services:
  frontend:
    image: ghcr.io/pixeldevripon/island-tours-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: island-tours-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - INTERNAL_API_BASE_URL=http://island-tours-api:5050/api
    restart: unless-stopped
    networks:
      - island-tours-network

networks:
  island-tours-network:
    external: true
