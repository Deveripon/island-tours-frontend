name: Build and Push tripwheel frontend docker image

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to use for the workflow"
        required: true
        default: "dev"

jobs:
  build-and-push-tripwheel-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: setup docker buildx
        uses: docker/setup-buildx-action@v3

      - name: login to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: build docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/tripwheel-web:1.0.0 -f Dockerfile.official .
          docker tag ${{ secrets.DOCKER_USERNAME }}/tripwheel-web:1.0.0 ${{ secrets.DOCKER_USERNAME }}/tripwheel-web:latest

      - name: push docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/tripwheel-web:1.0.0 
          docker push ${{ secrets.DOCKER_USERNAME }}/tripwheel-web:latest
